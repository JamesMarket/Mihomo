name: Auto Build MRS and YAML Rules

on:
  schedule:
    # 每 6 小时运行一次 (北京时间 8:00, 14:00, 20:00, 02:00)
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4

      - name: 2. 下载 Mihomo 内核
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo ">>> 下载最新正式版内核 (Compatible)..."
          gh release download --repo MetaCubeX/mihomo --pattern "*linux-amd64-compatible-v*.gz" --output mihomo.gz
          
          gunzip mihomo.gz
          chmod +x mihomo
          
          # 创建结果存放目录
          mkdir -p RULE-SET
          
          echo ">>> 内核版本："
          ./mihomo -v

      - name: 3. 下载、合并并去重去广告源
        run: |
          echo ">>> [1/5] 下载 Hagezi 国际去广告源..."
          curl -sSL "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/domains/pro.plus.txt" -o hagezi.txt
          
          echo ">>> [2/5] 下载 Loyalsoldier 国内去广告源..."
          curl -sSL "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/reject-list.txt" -o cn_reject.txt
          
          if [ ! -s hagezi.txt ] || [ ! -s cn_reject.txt ]; then
            echo "❌ 下载源文件失败或文件为空！"
            exit 1
          fi

          echo ">>> [3/5] 合并所有源并进行全局去重..."
          # 提取纯域名并初步合并
          cat hagezi.txt cn_reject.txt | grep -vE '^#|^$' > merged_raw.txt
          
          # 检查并提取本地自定义黑名单
          if [ -f "RULE-SET/block.yaml" ]; then
            echo "发现 RULE-SET/block.yaml，提取并合并..."
            sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' RULE-SET/block.yaml | grep -vE '^#|^$' >> merged_raw.txt
          fi
          
          # 核心魔法：利用 sort -u 进行全局排序并彻底去重
          sort -u merged_raw.txt > final_domains.txt
          
          # 统计去重后的域名总数，方便在日志中查看
          DOMAIN_COUNT=$(wc -l < final_domains.txt)
          echo "✅ 合并去重完成，当前规则库共包含 $DOMAIN_COUNT 个高危/广告域名！"

          echo ">>> [4/5] 生成标准 YAML 规则..."
          YAML_FILE="RULE-SET/hagezi_pro_plus.yaml"
          echo "payload:" > $YAML_FILE
          sed "s/^/  - '/; s/$/'/" final_domains.txt >> $YAML_FILE
          
          echo ">>> [5/5] 编译为终极二进制 (.mrs)..."
          ./mihomo convert-ruleset domain yaml $YAML_FILE RULE-SET/hagezi_pro_plus.mrs
          
          echo ">>> 验证生成结果"
          ls -lh RULE-SET/hagezi_pro_plus.*
          
          # 清理所有临时产生的文本文件
          rm hagezi.txt cn_reject.txt merged_raw.txt final_domains.txt

      - name: 4. 提交并上传
        run: |
          # 删除内核文件，避免提交到仓库
          rm mihomo

          # 配置 Git 身份
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加生成的文件
          git add RULE-SET/hagezi_pro_plus.mrs RULE-SET/hagezi_pro_plus.yaml
          
          # 提交更改 (如果没有更改则直接 exit 0 保证流水线不报错)
          git commit -m "Auto-update rules: Binary and YAML [skip ci]" || exit 0
          git push

      - name: 5. 刷新 jsdelivr CDN 缓存
        if: success() 
        run: |
          echo ">>> 等待 GitHub 服务器同步数据..."
          sleep 5
          
          echo ">>> 开始发送清理请求..."
          curl "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/RULE-SET/hagezi_pro_plus.mrs"
          echo ""
          curl "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/RULE-SET/hagezi_pro_plus.yaml"
          echo ""
          curl "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/RULE-SET/direct.yaml"
          
          echo -e "\n✅ jsdelivr 缓存刷新指令已发送！"
